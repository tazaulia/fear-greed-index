name: Update data

# Refreshes data.json once a day. The commit it produces triggers Vercel's
# auto-deploy, so the live site updates with no manual steps. Can also be run
# on demand from the Actions tab (workflow_dispatch).
on:
  schedule:
    # 22:30 UTC daily — comfortably after the US market close in both EST/EDT.
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest data
        run: node scripts/fetch-data.js

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data.json; then
            echo "No data change — nothing to commit."
          else
            git add data.json
            git commit -m "data: daily update"
            git push
          fi
