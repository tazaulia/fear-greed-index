name: Update data

# Refreshes the data in Neon once a day. The site reads from Neon at request
# time (via the /api/data function), so there is NO commit and NO redeploy —
# this job just upserts rows. Can also be run on demand from the Actions tab.
on:
  schedule:
    # 22:30 UTC daily — comfortably after the US market close in both EST/EDT.
    - cron: '30 22 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data into Neon
        run: node scripts/fetch-data.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
