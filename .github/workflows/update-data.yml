name: Update data

# Refreshes the data in Neon once a day. The site reads from Neon at request
# time (via the /api/data function), so there is NO commit and NO redeploy —
# this job just upserts rows. Can also be run on demand from the Actions tab.
on:
  schedule:
    # 21:00 UTC daily = 4:00 PM EST (winter) / 5:00 PM EDT (summer). GitHub cron
    # is UTC-only (no DST), so the ET time swings an hour across the year; 21:00
    # lands right at the 4 PM ET close in winter. In practice GitHub's scheduled
    # crons run LATE — observed ~20-30 min behind schedule — so this job really
    # fires around 21:20-21:30+ UTC, comfortably after the close (and close to
    # the 21:30 cron-job.org Telegram trigger; see CLAUDE.md). Don't lower it
    # past 21:00 or winter runs would risk preceding the close (a fast cron +
    # an on-time day) and grab a mid-session value.
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest data into Neon
        run: node scripts/fetch-data.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
