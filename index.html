<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNN Fear & Greed vs S&P 500</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f8f6;color:#222;padding:20px 24px}
  h1{font-size:17px;font-weight:500;margin-bottom:2px}
  .sub{font-size:12px;color:#888;margin-bottom:16px}
  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .leg{display:flex;gap:16px;font-size:11px;color:#777;align-items:center}
  .li{display:flex;align-items:center;gap:5px}
  .btns{display:flex;gap:6px}
  button{font-size:12px;padding:3px 10px;border:1px solid #ccc;background:transparent;border-radius:5px;cursor:pointer;color:#444}
  button.on{background:#e8e8e5;border-color:#999}
  .wrap{position:relative;width:100%;height:420px;background:#fff;border-radius:10px;padding:14px 14px 10px;border:1px solid #e5e5e3}
  .state{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#999;text-align:center;padding:0 20px}
  .note{font-size:10px;color:#bbb;margin-top:10px}
  .theme-btn{font-size:12px;padding:3px 10px;border:1px solid #ccc;background:transparent;border-radius:5px;cursor:pointer;color:#444}
  body.dark{background:#1c1c1a;color:#eee}
  body.dark .wrap{background:#242421;border-color:#333}
  body.dark button{border-color:#444;color:#bbb}
  body.dark button.on{background:#333;border-color:#666}
  body.dark .leg,.dark .note{color:#666}
  body.dark .theme-btn{border-color:#444;color:#bbb}
  @media(prefers-color-scheme:dark){
    body:not(.light){background:#1c1c1a;color:#eee}
    body:not(.light) .wrap{background:#242421;border-color:#333}
    body:not(.light) button{border-color:#444;color:#bbb}
    body:not(.light) button.on{background:#333;border-color:#666}
    body:not(.light) .leg, body:not(.light) .note{color:#666}
    body:not(.light) .theme-btn{border-color:#444;color:#bbb}
  }
</style>
</head>
<body>
<h1>CNN Fear &amp; Greed Index vs S&amp;P 500</h1>
<div class="sub" id="sub">Loading…</div>

<div class="top">
  <div class="leg">
    <div class="li"><span style="width:22px;height:2px;background:#378ADD;display:inline-block;border-radius:1px"></span>Fear &amp; Greed (left, 0–100)</div>
    <div class="li"><span style="width:22px;height:2px;background:#8B6914;display:inline-block;border-radius:1px"></span>S&amp;P 500 (right, index)</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="btns">
      <button onclick="go(90)"  id="b90">3m</button>
      <button onclick="go(180)" id="b180">6m</button>
      <button onclick="go(365)" id="b365">1y</button>
      <button onclick="go(730)" id="b730">2y</button>
      <button onclick="go(1825)" id="b1825" class="on">5y</button>
    </div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀︎</button>
  </div>
</div>

<div class="wrap">
  <canvas id="c" role="img" aria-label="CNN Fear & Greed Index vs S&P 500 daily values, trailing five years"></canvas>
  <div class="state" id="state">Loading data…</div>
</div>
<div class="note">F&amp;G: CNN Business · S&amp;P 500: Yahoo Finance (^GSPC) · auto-updated daily · no fabricated data</div>

<script>
let DATA = [];
let chart, activeRange = 1825;

function isDarkMode(){
  if(document.body.classList.contains('dark')) return true;
  if(document.body.classList.contains('light')) return false;
  return window.matchMedia('(prefers-color-scheme:dark)').matches;
}

function toggleTheme(){
  const body = document.body;
  const sysDark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  if(body.classList.contains('dark')){
    body.classList.remove('dark');
    body.classList.add('light');
    document.getElementById('themeBtn').textContent = '☽';
  } else if(body.classList.contains('light')){
    body.classList.remove('light');
    document.getElementById('themeBtn').textContent = sysDark ? '☀︎' : '☽';
  } else {
    // no override yet — toggle away from system default
    if(sysDark){ body.classList.add('light'); document.getElementById('themeBtn').textContent = '☽'; }
    else { body.classList.add('dark'); document.getElementById('themeBtn').textContent = '☀︎'; }
  }
  if(DATA.length) draw();
}

function zc(v){return v<=24?'#E24B4A':v<=44?'#F09595':v<=55?'#888780':v<=75?'#97C459':'#3B6D11'}
function zl(v){return v<=24?'Extreme Fear':v<=44?'Fear':v<=55?'Neutral':v<=75?'Greed':'Extreme Greed'}

function go(days){
  activeRange = days;
  ['90','180','365','730','1825'].forEach(d => {
    document.getElementById('b'+d).className = d == days ? 'on' : '';
  });
  if(DATA.length) draw();
}

function draw(){
  // Window is measured back from the most recent available trading day.
  const last = DATA[DATA.length - 1].d;
  const ref = new Date(last);
  ref.setDate(ref.getDate() - activeRange);
  const cut = ref.toISOString().slice(0,10);
  const sl = DATA.filter(r => r.d >= cut);

  const isDark = isDarkMode();
  const gC = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.055)';
  const tC = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.45)';
  const spVals = sl.map(r => r.sp500);
  const pad = (Math.max(...spVals) - Math.min(...spVals)) * 0.06;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('c'), {
    type: 'line',
    data: {
      labels: sl.map(r => r.d),
      datasets: [
        {
          label: 'Fear & Greed',
          data: sl.map(r => r.fg),
          borderColor: '#378ADD',
          backgroundColor: 'transparent',
          fill: false,
          borderWidth: 1.5,
          pointRadius: 0,
          pointHoverRadius: 3,
          tension: 0.2,
          yAxisID: 'yFG'
        },
        {
          label: 'S&P 500',
          data: sl.map(r => r.sp500),
          borderColor: '#8B6914',
          backgroundColor: 'transparent',
          fill: false,
          borderWidth: 1.8,
          pointRadius: 0,
          pointHoverRadius: 3,
          tension: 0.2,
          yAxisID: 'ySP'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: {mode: 'index', intersect: false},
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor: isDark ? '#2a2a27' : '#fff',
          borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.08)',
          borderWidth: 1,
          titleColor: isDark ? '#eee' : '#222',
          bodyColor: isDark ? '#aaa' : '#555',
          padding: 9,
          callbacks: {
            title: items => {
              const d = new Date(items[0].label);
              return d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});
            },
            label: item => item.datasetIndex === 0
              ? `  F&G: ${Math.round(item.raw)} — ${zl(item.raw)}`
              : `  S&P 500: ${item.raw.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}`
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: tC,
            maxTicksLimit: activeRange <= 90 ? 6 : activeRange <= 365 ? 8 : 10,
            maxRotation: 0,
            font: {size: 10},
            callback: (_, i) => {
              if(i >= sl.length) return '';
              const d = new Date(sl[i].d);
              return activeRange <= 180
                ? d.toLocaleDateString('en-US', {month:'short', day:'numeric'})
                : d.toLocaleDateString('en-US', {month:'short', year:'2-digit'});
            }
          },
          grid: {color: gC}
        },
        yFG: {
          type: 'linear',
          position: 'left',
          min: 0, max: 100,
          ticks: {
            color: '#378ADD',
            font: {size: 10},
            stepSize: 25,
            callback: v => ({0:'0', 25:'25', 50:'50', 75:'75', 100:'100'}[v] ?? '')
          },
          grid: {color: gC},
          title: {display: true, text: 'Fear & Greed (0–100)', color: '#378ADD', font: {size: 10}}
        },
        ySP: {
          type: 'linear',
          position: 'right',
          min: Math.floor(Math.min(...spVals) - pad),
          max: Math.ceil(Math.max(...spVals) + pad),
          ticks: {color: '#8B6914', font: {size: 10}, callback: v => Math.round(v).toLocaleString('en-US')},
          grid: {drawOnChartArea: false},
          title: {display: true, text: 'S&P 500 (index)', color: '#8B6914', font: {size: 10}}
        }
      }
    }
  });
}

function fmtDate(d){
  return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

async function load(){
  const stateEl = document.getElementById('state');
  try {
    const res = await fetch('./data.json', {cache: 'no-cache'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    DATA = json.rows || [];
    if(!DATA.length) throw new Error('no rows');

    const start = DATA[0].d, end = DATA[DATA.length - 1].d;
    document.getElementById('sub').textContent =
      `Daily · ${fmtDate(start)} – ${fmtDate(end)} · auto-updated`;
    stateEl.style.display = 'none';
    draw();
  } catch (err) {
    stateEl.textContent = 'Could not load data. Please try again later.';
    document.getElementById('sub').textContent = 'Data unavailable';
    console.error('Failed to load data.json:', err);
  }
}

// init toggle label
document.getElementById('themeBtn').textContent =
  window.matchMedia('(prefers-color-scheme:dark)').matches ? '☀︎' : '☽';

load();
</script>
</body>
</html>
