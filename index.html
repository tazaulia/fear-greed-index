<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fear, greed and the S&P 500</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root{
    --canvas:#ffffff;
    --ink:#0d0d0d;
    --body-grey:#595959;
    --hairline:#d9d9d9;
    --red:#e3120b;
    --fg:#2d6a9e;   /* Fear & Greed line */
    --sp:#a6a6a6;   /* S&P 500 line */
    --serif:'Source Serif 4', ui-serif, Georgia, serif;
    --sans:'Source Sans 3', system-ui, Helvetica, Arial, sans-serif;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  body{ font-family:var(--sans); background:var(--canvas); color:var(--ink); font-size:15px; line-height:1.45; }
  .num{ font-variant-numeric:tabular-nums lining-nums; }

  main{
    margin:0;
    padding:clamp(20px,3vw,32px) clamp(18px,3vw,32px);
    border-top:2px solid var(--red);   /* full-bleed Economist red rule */
  }

  /* Header */
  .kicker{ font-weight:600; font-size:14px; color:var(--red); margin-bottom:6px; }
  h1{
    font-family:var(--serif); font-weight:700;
    font-size:clamp(26px,5vw,36px); line-height:1.1;
    text-wrap:balance;
  }

  /* Indicators */
  .indicators{ display:flex; gap:clamp(20px,5vw,44px); margin:20px 0 24px; }
  .ind{ min-width:0; }
  .ind-label{ font-size:13px; color:var(--body-grey); }
  .ind-val{ font-family:var(--serif); font-weight:600; font-size:clamp(20px,4vw,24px); line-height:1.1; margin-top:2px; }
  .ind-zone{ font-size:13px; color:var(--body-grey); }

  /* Controls */
  .controls{ display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
    margin-top:8px; padding-top:14px; border-top:1px solid var(--hairline); }
  .ranges{ display:flex; }
  .ranges button{
    appearance:none; background:none; border:0; cursor:pointer;
    font-family:var(--sans); font-size:15px; font-weight:600; color:var(--ink);
    padding:9px 9px; line-height:1; border-bottom:2px solid transparent;
    transition:color 130ms ease;
  }
  .ranges button:first-child{ padding-left:0; }
  .ranges button:hover{ color:var(--red); }
  .ranges button:active{ scale:.96; }
  .ranges button.on{ color:var(--red); border-bottom-color:var(--red); }
  .ranges button:focus-visible{ outline:2px solid var(--red); outline-offset:2px; }

  .legend{ display:flex; gap:16px; font-size:13px; color:var(--body-grey); }
  .legend .li{ display:flex; align-items:center; gap:7px; }
  .legend .sw{ width:18px; height:2px; }
  .legend .sw.fg{ background:var(--fg); }
  .legend .sw.sp{ background:var(--sp); }

  /* Chart */
  .wrap{ position:relative; width:100%; height:clamp(340px,46vw,560px); margin-top:18px; }
  .state{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:14px; color:var(--body-grey); text-align:center; padding:0 24px; }

  .source{ margin-top:16px; padding-top:12px; border-top:1px solid var(--hairline);
    font-size:13px; color:var(--body-grey); }
</style>
</head>
<body>
<main>
  <header>
    <div class="kicker">Markets &middot; daily sentiment</div>
    <h1>Fear &amp; Greed Index</h1>
  </header>

  <section class="indicators" id="indicators" aria-label="Fear &amp; Greed readings">
    <div class="ind">
      <div class="ind-label">Previous close</div>
      <div class="ind-val num" id="v-now">&mdash;</div>
      <div class="ind-zone" id="z-now">&nbsp;</div>
    </div>
    <div class="ind">
      <div class="ind-label">One week ago</div>
      <div class="ind-val num" id="v-week">&mdash;</div>
      <div class="ind-zone" id="z-week">&nbsp;</div>
    </div>
    <div class="ind">
      <div class="ind-label">One month ago</div>
      <div class="ind-val num" id="v-month">&mdash;</div>
      <div class="ind-zone" id="z-month">&nbsp;</div>
    </div>
  </section>

  <div class="controls">
    <div class="ranges" role="group" aria-label="Time range">
      <button onclick="go(90)"   id="b90">3m</button>
      <button onclick="go(180)"  id="b180">6m</button>
      <button onclick="go(365)"  id="b365" class="on">1y</button>
      <button onclick="go(730)"  id="b730">2y</button>
      <button onclick="go(1825)" id="b1825">5y</button>
    </div>
    <div class="legend">
      <span class="li"><span class="sw fg"></span>Fear &amp; Greed</span>
      <span class="li"><span class="sw sp"></span>S&amp;P 500</span>
    </div>
  </div>

  <div class="wrap">
    <canvas id="c" role="img" aria-label="CNN Fear & Greed Index versus the S&P 500, daily values"></canvas>
    <div class="state" id="state">Loading data&hellip;</div>
  </div>

  <p class="source" id="source">Source: CNN Business; Yahoo Finance (^GSPC) &middot; auto-updated daily</p>
</main>

<script>
let DATA = [];
let chart, activeRange = 365;

function zl(v){return v<=24?'Extreme fear':v<=44?'Fear':v<=55?'Neutral':v<=75?'Greed':'Extreme greed'}
const css = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();

function go(days){
  activeRange = days;
  ['90','180','365','730','1825'].forEach(d => {
    document.getElementById('b'+d).classList.toggle('on', d == days);
  });
  if(DATA.length) draw();
}

function draw(){
  const last = DATA[DATA.length - 1].d;
  const ref = new Date(last);
  ref.setDate(ref.getDate() - activeRange);
  const cut = ref.toISOString().slice(0,10);
  const sl = DATA.filter(r => r.d >= cut);

  const fg = css('--fg'), sp = css('--sp'), ink = css('--ink'), grey = css('--body-grey'), hair = css('--hairline');
  const spVals = sl.map(r => r.sp500);
  const pad = (Math.max(...spVals) - Math.min(...spVals)) * 0.06;

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('c'), {
    type: 'line',
    data: {
      labels: sl.map(r => r.d),
      datasets: [
        {label:'Fear & Greed', data: sl.map(r => r.fg), borderColor: fg, borderWidth: 2,
         pointRadius: 0, pointHoverRadius: 3, tension: 0.18, yAxisID: 'yFG'},
        {label:'S&P 500', data: sl.map(r => r.sp500), borderColor: sp, borderWidth: 2,
         pointRadius: 0, pointHoverRadius: 3, tension: 0.18, yAxisID: 'ySP'}
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: {mode: 'index', intersect: false},
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor: '#ffffff', borderColor: hair, borderWidth: 1,
          titleColor: ink, bodyColor: grey, padding: 10, cornerRadius: 4, displayColors: false,
          titleFont: {family: "'Source Serif 4', Georgia, serif", size: 13, weight: '600'},
          bodyFont: {family: "'Source Sans 3', system-ui, sans-serif", size: 13},
          callbacks: {
            title: items => new Date(items[0].label).toLocaleDateString('en-GB',
              {day:'numeric', month:'short', year:'numeric'}),
            label: item => item.datasetIndex === 0
              ? `F&G: ${Math.round(item.raw)} (${zl(item.raw)})`
              : `S&P: ${item.raw.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2})}`
          }
        }
      },
      scales: {
        x: {
          ticks: {color: grey, maxTicksLimit: activeRange <= 90 ? 6 : activeRange <= 365 ? 8 : 10,
            maxRotation: 0, font: {size: 11},
            callback: (_, i) => {
              if(i >= sl.length) return '';
              const d = new Date(sl[i].d);
              return activeRange <= 180
                ? d.toLocaleDateString('en-GB', {month:'short', day:'numeric'})
                : d.toLocaleDateString('en-GB', {month:'short', year:'numeric'});
            }},
          grid: {display: false}, border: {color: hair}
        },
        yFG: {
          type:'linear', position:'left', min:0, max:100,
          ticks:{color: fg, font:{size:11}, stepSize:25,
            callback: v => ({0:'0',25:'25',50:'50',75:'75',100:'100'}[v] ?? '')},
          grid:{color: hair}, border:{display:false},
          title:{display:true, text:'Fear & Greed', color: fg, font:{size:11, weight:'600'}}
        },
        ySP: {
          type:'linear', position:'right',
          min: Math.floor(Math.min(...spVals) - pad), max: Math.ceil(Math.max(...spVals) + pad),
          ticks:{color: sp, font:{size:11}, callback: v => Math.round(v).toLocaleString('en-US')},
          grid:{drawOnChartArea:false}, border:{display:false},
          title:{display:true, text:'S&P 500', color: sp, font:{size:11, weight:'600'}}
        }
      }
    }
  });
}

function rowAtOrBefore(target){
  for(let i = DATA.length - 1; i >= 0; i--){ if(DATA[i].d <= target) return DATA[i]; }
  return DATA[0];
}
function shiftDays(iso, days){ const x = new Date(iso); x.setDate(x.getDate() - days); return x.toISOString().slice(0,10); }
function fillReading(valEl, zoneEl, row){
  document.getElementById(valEl).textContent = Math.round(row.fg);
  document.getElementById(zoneEl).textContent = zl(row.fg);
}

async function load(){
  const stateEl = document.getElementById('state');
  try {
    const res = await fetch('./data.json', {cache: 'no-cache'});
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    DATA = json.rows || [];
    if(!DATA.length) throw new Error('no rows');

    const last = DATA[DATA.length - 1];

    fillReading('v-now',   'z-now',   last);
    fillReading('v-week',  'z-week',  rowAtOrBefore(shiftDays(last.d, 7)));
    fillReading('v-month', 'z-month', rowAtOrBefore(shiftDays(last.d, 30)));

    stateEl.style.display = 'none';
    draw();
  } catch (err) {
    stateEl.textContent = 'Could not load data. Please try again later.';
    console.error('Failed to load data.json:', err);
  }
}

Chart.defaults.font.family = "'Source Sans 3', system-ui, Helvetica, Arial, sans-serif";
Chart.defaults.color = '#595959';
load();
</script>
</body>
</html>
